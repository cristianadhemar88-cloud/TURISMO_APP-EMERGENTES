{% extends 'base.html' %}

{% block content %}

<h2>Editar Cliente</h2>

<form method="POST">

    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ cliente.nombre }}">
    </div>

    <div class="mb-3">
        <label>Apellido</label>
        <input type="text" name="apellido" class="form-control" value="{{ cliente.apellido }}">
    </div>

    <div class="mb-3">
        <label>Teléfono</label>
        <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono }}">
    </div>

    <div class="mb-3">
        <label>Correo</label>
        <input type="email" name="correo" class="form-control" value="{{ cliente.correo }}">
    </div>

    <div class="mb-3">
        <label>CI</label>
        <input type="text" name="ci" class="form-control" value="{{ cliente.ci }}">
    </div>

    <button class="btn btn-success">
        Actualizar
    </button>

</form>

{% endblock %}
