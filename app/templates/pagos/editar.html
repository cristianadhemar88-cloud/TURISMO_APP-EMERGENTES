{% extends 'base.html' %}

{% block content %}

<h2>Editar Pago</h2>

<form method="POST">

    <div class="mb-3">

        <label>Reserva</label>

        <select name="reserva_id"
                class="form-control">

            {% for reserva in reservas %}

            <option value="{{ reserva.id }}"
                {% if reserva.id == pago.reserva_id %}
                    selected
                {% endif %}
            >
                {{ reserva.cliente.nombre }}
                -
                {{ reserva.paquete.nombre }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Monto</label>

        <input type="number"
               step="0.01"
               name="monto"
               class="form-control"
               value="{{ pago.monto }}">

    </div>

    <div class="mb-3">

        <label>Método de Pago</label>

        <select name="metodo_pago"
                class="form-control">

            <option
                {% if pago.metodo_pago == "Efectivo" %}
                    selected
                {% endif %}
            >
                Efectivo
            </option>

            <option
                {% if pago.metodo_pago == "Transferencia" %}
                    selected
                {% endif %}
            >
                Transferencia
            </option>

            <option
                {% if pago.metodo_pago == "Tarjeta" %}
                    selected
                {% endif %}
            >
                Tarjeta
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label>Fecha de Pago</label>

        <input type="date"
               name="fecha_pago"
               class="form-control"
               value="{{ pago.fecha_pago }}">

    </div>

    <div class="mb-3">

        <label>Estado</label>

        <select name="estado"
                class="form-control">

            <option
                {% if pago.estado == "Pendiente" %}
                    selected
                {% endif %}
            >
                Pendiente
            </option>

            <option
                {% if pago.estado == "Pagado" %}
                    selected
                {% endif %}
            >
                Pagado
            </option>

        </select>

    </div>

    <button type="submit"
            class="btn btn-success">
        Actualizar
    </button>

    <a href="/pagos"
       class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
