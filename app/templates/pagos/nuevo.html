{% extends 'base.html' %}

{% block content %}

<h2>Nuevo Pago</h2>

<form method="POST">

    <div class="mb-3">

        <label>Reserva</label>

        <select name="reserva_id"
                class="form-control">

            {% for reserva in reservas %}

            <option value="{{ reserva.id }}">
                {{ reserva.cliente.nombre }}
                -
                {{ reserva.paquete.nombre }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">
        <label>Monto</label>

        <input type="number"
               step="0.01"
               name="monto"
               class="form-control">
    </div>

    <div class="mb-3">

        <label>Método de Pago</label>

        <select name="metodo_pago"
                class="form-control">

            <option>Efectivo</option>
            <option>Transferencia</option>
            <option>Tarjeta</option>

        </select>

    </div>

    <div class="mb-3">

        <label>Fecha de Pago</label>

        <input type="date"
               name="fecha_pago"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Estado</label>

        <select name="estado"
                class="form-control">

            <option>Pendiente</option>
            <option>Pagado</option>

        </select>

    </div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>

{% endblock %}
