{% extends 'base.html' %}

{% block title %}
Nueva Reserva
{% endblock %}

{% block content %}

<div class="card">

```
<div class="card-header bg-primary text-white">

    <h4>
        <i class="fa-solid fa-calendar-check"></i>
        Nueva Reserva
    </h4>

</div>

<div class="card-body">

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Cliente
            </label>

            <div class="row">

                <div class="col-md-10">

                    <select
                        name="cliente_id"
                        class="form-select">

                        {% for cliente in clientes %}

                        <option value="{{ cliente.id }}">
                            {{ cliente.nombre }} {{ cliente.apellido }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-2">

                    <a href="/clientes/nuevo"
                       class="btn btn-success w-100">

                       <i class="fa-solid fa-user-plus"></i>

                    </a>

                </div>

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Paquete Turístico
            </label>

            <select
                name="paquete_id"
                class="form-select">

                {% for paquete in paquetes %}

                <option value="{{ paquete.id }}">
                    {{ paquete.nombre }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Fecha de Reserva
            </label>

            <input
                type="date"
                name="fecha"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Estado
            </label>

            <select
                name="estado"
                class="form-select">

                <option>Pendiente</option>
                <option>Confirmada</option>
                <option>Cancelada</option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            <i class="fa-solid fa-floppy-disk"></i>
            Guardar Reserva

        </button>

        <a href="/reservas"
           class="btn btn-secondary">

            Volver

        </a>

    </form>

</div>
```

</div>

{% endblock %}
